<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a1a; color: white; text-align: center; font-family: sans-serif; overflow: hidden; margin:0; padding: 20px;}
        #qText { font-size: 50px; font-weight: bold; color: #fbbf24; margin: 30px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%; margin: auto; }
        .choice { background: #1e293b; padding: 30px; font-size: 35px; border-radius: 15px; border: 2px solid #334155; opacity: 0; transition: 0.5s; }
        .choice.visible { opacity: 1; }
        .choice.selected { background: #3b82f6; border-color: #60a5fa; transform: scale(1.05); }
        #actionBox { margin-top: 40px; font-size: 45px; font-weight: bold; padding: 20px; border-radius: 10px; }
        #themeBox { position: absolute; top: 20px; right: 20px; background: #3b82f6; padding: 15px; border-radius: 10px; font-size: 25px; font-weight: bold; display: none; }
        .win { font-size: 80px; color: #4ade80; text-shadow: 0 0 30px #4ade80; position: absolute; top: 30%; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 50px 0; z-index: 10; display: none;}
    </style>
</head>
<body>
    <div id="setup">
        <input id="pin" placeholder="PIN" style="font-size:30px; padding:10px;"><br><br>
        <button onclick="join()" style="font-size:30px; padding:10px 30px;">Afficher</button>
    </div>

    <div id="game" style="display: none;">
        <div id="themeBox">Prochain thème : <span id="themeName"></span></div>
        <div id="qText">En attente de la question...</div>
        
        <div class="grid">
            <div id="cA" class="choice">A: <span id="tA"></span></div>
            <div id="cB" class="choice">B: <span id="tB"></span></div>
            <div id="cC" class="choice">C: <span id="tC"></span></div>
            <div id="cD" class="choice">D: <span id="tD"></span></div>
        </div>

        <div id="actionBox"></div>
        <div id="winScreen" class="win">🏆 <span id="winName"></span> REMPORTE LA PARTIE AVEC 10 POINTS ! 🏆</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function join() {
            socket.emit('join_game', { pin: document.getElementById('pin').value, name: 'Spectateur', role: 'spectateur' });
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        socket.on('theme_notification', (theme) => {
            document.getElementById('themeBox').style.display = 'block';
            document.getElementById('themeName').innerText = theme;
        });

        socket.on('display_question', (data) => {
            document.getElementById('themeBox').style.display = 'none';
            document.getElementById('actionBox').innerText = '';
            document.getElementById('actionBox').style.background = 'transparent';
            document.getElementById('qText').innerText = data.question_text;
            
            ['A','B','C','D'].forEach((l, i) => {
                const el = document.getElementById(`c${l}`);
                el.className = 'choice'; 
                document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`];
                setTimeout(() => el.classList.add('visible'), (i + 1) * 1000);
            });
        });

        socket.on('spectator_answer_locked', (data) => {
            document.getElementById('actionBox').innerText = `⚡ ${data.name} A CHOISI LA RÉPONSE : ${data.answer}`;
            document.getElementById('actionBox').style.background = 'rgba(59, 130, 246, 0.3)';
            document.getElementById(`c${data.answer}`).classList.add('selected');
        });

        socket.on('answer_correct', (data) => {
            document.getElementById('actionBox').innerText = `✅ BONNE RÉPONSE ! Score de ${data.name} : ${data.score}`;
            document.getElementById('actionBox').style.background = 'rgba(34, 197, 94, 0.3)';
            document.getElementById('actionBox').style.color = '#4ade80';
        });

        socket.on('answer_wrong', (data) => {
            document.getElementById('actionBox').innerText = `❌ FAUX ! Score de ${data.name} : ${data.score}. BUZZER RÉACTIVÉ !`;
            document.getElementById('actionBox').style.background = 'rgba(239, 68, 68, 0.3)';
            document.getElementById('actionBox').style.color = '#f87171';
            ['A','B','C','D'].forEach((l) => document.getElementById(`c${l}`).classList.remove('selected'));
        });

        socket.on('game_over', (data) => {
            document.getElementById('winScreen').style.display = 'block';
            document.getElementById('winName').innerText = data.name;
        });
    </script>
</body>
</html>

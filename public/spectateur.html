<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chamak Chalo - Spectateur</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; }
        .option { background: #3a3a3a; padding: 20px; margin: 10px; display: inline-block; width: 40%; }
        #teams-list { display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <h1 id="question-text">En attente du lancement...</h1>
    <div id="options-grid"></div>
    <div id="teams-list"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const roomId = window.location.pathname.split('/')[1];
        socket.emit('join_room', roomId);
        socket.on('new_question_intro', (d) => { document.getElementById('question-text').innerText = d.text; });
        socket.on('show_options', (d) => {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = d.options.map((opt, i) => `<div class="option">${String.fromCharCode(65+i)} : ${opt}</div>`).join('');
        });
        socket.on('update_teams', (teams) => {
            const list = document.getElementById('teams-list');
            list.innerHTML = Object.values(teams).map(t => `<div>${t.name}: ${t.score}</div>`).join('');
        });
    </script>
</body>
</html>

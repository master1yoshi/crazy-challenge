<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Challenge - Spectateur</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #main-content { flex: 4; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #sidebar { flex: 1; background: #222; border-left: 2px solid #444; padding: 20px; display: flex; flex-direction: column; }
        
        #question-box { background: #2c2c2c; padding: 30px; border-radius: 12px; margin: 20px auto; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 20px auto; }
        .option { background: #3a3a3a; padding: 25px; font-size: 20px; border-radius: 8px; font-weight: bold; }
        
        .team-card { background: #007bff; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 20px; }
        #anim { font-size: 30px; font-weight: bold; margin: 20px; height: 50px; color: #ffc107; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 id="category-title">EN ATTENTE DU LANCEMENT...</h1>
        <div id="question-box">
            <h2 id="question-text">Le Match va bientôt commencer.</h2>
        </div>
        <div class="grid">
            <div class="option" id="btn-option-a">A</div>
            <div class="option" id="btn-option-b">B</div>
            <div class="option" id="btn-option-c">C</div>
            <div class="option" id="btn-option-d">D</div>
        </div>
        <div id="anim"></div>
    </div>

    <div id="sidebar">
        <h2>CLASSEMENT</h2>
        <div id="teams-list"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const roomId = window.location.pathname.split('/')[1];
        socket.emit('join_room', roomId);

        // Mise à jour complète du jeu
        socket.on('game_state_update', (d) => {
            document.getElementById('category-title').innerText = "CATÉGORIE : " + d.type.toUpperCase();
            document.getElementById('question-text').innerText = d.question;
            renderTeams(d.teams);
        });

        socket.on('show_options', (data) => {
            document.getElementById('anim').innerText = "BUZZER ACTIF !";
            document.getElementById('btn-option-a').innerText = "A : " + data.options[0];
            document.getElementById('btn-option-b').innerText = "B : " + data.options[1];
            document.getElementById('btn-option-c').innerText = "C : " + data.options[2];
            document.getElementById('btn-option-d').innerText = "D : " + data.options[3];
        });

        socket.on('update_teams', (teams) => renderTeams(teams));

        function renderTeams(teams) {
            const container = document.getElementById('teams-list');
            container.innerHTML = '';
            Object.values(teams).sort((a,b) => b.score - a.score).forEach(team => {
                container.innerHTML += `<div class="team-card"><strong>${team.name}</strong><br>${team.score} Pts</div>`;
            });
        }

        socket.on('result_animation', (data) => {
            const color = data.status === 'correct' ? '#28a745' : '#dc3545';
            document.getElementById('anim').innerHTML = `<span style="color: ${color};">${data.status === 'correct' ? '✅' : '❌'} ${data.team}</span>`;
        });
    </script>
</body>
</html>

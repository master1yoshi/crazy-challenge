<!DOCTYPE html>
<html>
<head>
    <title>LIVE - Spectateur</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        #question-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border-bottom: 8px solid #00d4ff; margin-bottom: 40px; min-height: 250px; }
        #q-text { font-size: 45px; margin: 20px 0; }
        #q-type { color: #00d4ff; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; font-size: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .opt-item { background: #333; padding: 25px; border-radius: 15px; font-size: 30px; border: 1px solid #555; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .team-card { background: #222; padding: 20px; border-radius: 15px; border: 4px solid #333; transition: 0.3s; }
        .active-buzz { border-color: #ff0000; background: #400; transform: scale(1.05); box-shadow: 0 0 40px red; }
        .score { font-size: 60px; font-weight: bold; color: #ffeb3b; display: block; }
    </style>
</head>
<body>
    <div id="question-box">
        <div id="q-type">PRÊT ?</div>
        <div id="q-text">En attente du lancement par le Host...</div>
        <div id="options-container"></div>
    </div>
    <div class="grid" id="teams-display"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        // Connexion automatique au salon basé sur l'URL
        const roomId = window.location.pathname.split('/')[1] || 'default';
        socket.emit('join_room', roomId);

        socket.on('update_teams', (teams) => {
            const container = document.getElementById('teams-display');
            container.innerHTML = "";
            for (let id in teams) {
                container.innerHTML += `
                    <div class="team-card" id="card-${id}">
                        <h2 style="margin:0">${teams[id].name}</h2>
                        <span class="score">${teams[id].score}</span>
                    </div>`;
            }
        });

        socket.on('new_question_intro', (data) => {
            document.getElementById('q-type').innerText = "CATÉGORIE : " + data.type;
            document.getElementById('q-text').innerText = data.text;
            document.getElementById('options-container').innerHTML = "";
            document.querySelectorAll('.team-card').forEach(c => c.classList.remove('active-buzz'));
        });

        socket.on('show_options', (data) => {
            let html = '<div class="options-grid">';
            data.options.forEach((opt, i) => {
                const letters = ['A', 'B', 'C', 'D'];
                html += `<div class="opt-item"><b>${letters[i]} :</b> ${opt}</div>`;
            });
            html += '</div>';
            document.getElementById('options-container').innerHTML = html;
        });

        socket.on('lock_buzz', (data) => {
            const card = document.getElementById('card-' + data.id);
            if(card) card.classList.add('active-buzz');
        });

        socket.on('result_animation', (data) => {
            document.getElementById('q-type').innerText = (data.status === 'correct' ? "✅ BRAVO " : "❌ DOMMAGE ") + data.team;
        });

        socket.on('game_over', (teams) => {
            document.getElementById('q-text').innerText = "FIN DU MATCH !";
            document.getElementById('options-container').innerHTML = "Consultez les scores finaux ci-dessous.";
        });
    </script>
</body>
</html>

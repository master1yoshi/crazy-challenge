<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Spectateur</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; margin: 0; font-family: sans-serif; }
        #main { flex: 4; padding: 40px; text-align: center; }
        #sidebar { flex: 1; background: #222; padding: 20px; border-left: 2px solid #444; height: 100vh; }
        .team-card { background: #007bff; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        #question-box { background: #333; padding: 40px; border-radius: 20px; font-size: 30px; margin-top: 50px; }
    </style>
</head>
<body>
    <div id="main">
        <h1 id="cat">En attente du host...</h1>
        <div id="question-box"><h2 id="q-text">Le match va bientôt commencer</h2></div>
        <div id="options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;"></div>
    </div>
    <div id="sidebar">
        <h2>Scores</h2>
        <div id="teams-list"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('join_room', window.location.pathname.split('/')[1]);
        socket.on('new_question', (d) => {
            document.getElementById('cat').innerText = d.type;
            document.getElementById('q-text').innerText = d.question;
            document.getElementById('options-grid').innerHTML = d.options.map(o => `<div style="background:#444; padding:20px; border-radius:10px;">${o}</div>`).join('');
            renderScores(d.teams);
        });
        function renderScores(t) {
            document.getElementById('teams-list').innerHTML = Object.values(t).map(x => `<div class="team-card">${x.name} : ${x.score} pts</div>`).join('');
        }
    </script>
</body>
</html>

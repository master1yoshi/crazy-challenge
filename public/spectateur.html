<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Écran</title>
    <style>
        body { background: radial-gradient(circle, #1a1a2e, #0f0f1a); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 50px; overflow: hidden; }
        
        #qText { font-size: 60px; font-weight: bold; color: #fbbf24; margin-bottom: 50px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 90%; margin: auto; }
        .choice { background: rgba(255,255,255,0.05); border: 3px solid rgba(255,255,255,0.2); padding: 30px; font-size: 40px; border-radius: 20px; opacity: 0; transition: 0.5s; }
        
        .choice.visible { opacity: 1; transform: translateY(0); }
        .choice.selected { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 30px #3b82f6; transform: scale(1.05); }

        #actionBox { margin-top: 50px; font-size: 50px; font-weight: bold; height: 100px; text-transform: uppercase; }
        
        .pulse-text { animation: blink 1s infinite; color: #ef4444; text-shadow: 0 0 20px red; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="setup">
        <h1>Écran Spectateur</h1>
        <input id="pin" placeholder="PIN" style="font-size:30px; padding:10px; text-align:center;"><br><br>
        <button onclick="join()" style="font-size:30px; padding:10px 30px; cursor:pointer;">Afficher</button>
    </div>

    <div id="game" style="display: none;">
        <div id="qText">Préparez-vous...</div>
        
        <div class="grid">
            <div id="cA" class="choice">A: <span id="tA"></span></div>
            <div id="cB" class="choice">B: <span id="tB"></span></div>
            <div id="cC" class="choice">C: <span id="tC"></span></div>
            <div id="cD" class="choice">D: <span id="tD"></span></div>
        </div>

        <div id="actionBox"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function join() {
            socket.emit('join_game', { pin: document.getElementById('pin').value, name: 'Spectateur', role: 'spectateur' });
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        socket.on('display_question', (data) => {
            document.getElementById('actionBox').className = '';
            document.getElementById('actionBox').innerHTML = '';
            document.getElementById('qText').innerText = data.question_text;
            
            ['A','B','C','D'].forEach((l, index) => {
                const el = document.getElementById(`c${l}`);
                el.className = 'choice'; // Reset classes
                document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`];
                setTimeout(() => el.classList.add('visible'), (index + 1) * 1000);
            });
        });

        // Quand quelqu'un buzz
        socket.on('spectator_answer_locked', (data) => {
            const box = document.getElementById('actionBox');
            box.innerHTML = `${data.name} A CHOISI : ${data.answer}`;
            box.style.color = "#60a5fa";
            
            // Met en évidence la réponse sur l'écran géant
            document.getElementById(`c${data.answer}`).classList.add('selected');
        });

        socket.on('answer_result', (isCorrect) => {
            const box = document.getElementById('actionBox');
            if(isCorrect) {
                 box.innerText = "✅ BONNE RÉPONSE !";
                 box.style.color = "#4ade80"; 
            } else {
                 box.innerText = "❌ MAUVAISE RÉPONSE !";
                 box.style.color = "#f87171";
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body style="background:black; color:gold; text-align:center; font-size:40px;">
    <div id="q">Bienvenue sur Chamak Chalo</div>
    <div id="buzzer"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('new_question', (q) => { document.getElementById('q').innerText = q.text; new Audio('start_game.mp3').play(); });
        socket.on('buzzer_hit', (name) => { document.getElementById('buzzer').innerText = name + " a buzzé !"; new Audio('buzz_sound.mp3').play(); });
    </script>
</body>
</html>

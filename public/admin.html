<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chamak Chalo - Host</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { margin: 0; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 2.5rem; }
        
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 15px 30px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }
        .btn-primary:active { transform: translateY(1px); }

        .dashboard { display: none; grid-template-columns: 350px 1fr; gap: 30px; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); color: white; border: 1px solid #475569; border-radius: 8px; font-family: 'Poppins'; font-size: 1rem; margin-bottom: 20px; outline: none; }
        select:focus { border-color: #3b82f6; }

        .player-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #10b981; transition: 0.3s; }
        .player-card span.score { background: #10b981; padding: 5px 12px; border-radius: 20px; font-weight: 800; }

        .q-area { margin-top: 20px; }
        .q-text { font-size: 1.8rem; font-weight: 600; color: #fbbf24; margin-bottom: 25px; line-height: 1.4; }
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .choice { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; font-size: 1.1rem; border: 1px solid transparent; }
        .choice.correct { background: rgba(16, 185, 129, 0.1); border-color: #10b981; color: #34d399; font-weight: 600; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }

        .buzz-alert { display: none; background: linear-gradient(135deg, #ef4444, #b91c1c); padding: 25px; border-radius: 16px; text-align: center; font-size: 1.5rem; font-weight: 600; margin-top: 30px; animation: pulse 2s infinite; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .action-btns { display: none; gap: 20px; margin-top: 20px; }
        .btn-valid { flex: 1; padding: 20px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 800; color: white; cursor: pointer; transition: 0.2s; }
        .btn-valid.yes { background: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-valid.no { background: #ef4444; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .btn-valid:hover { transform: translateY(-3px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="header glass-panel">
        <h1>Panneau Admin</h1>
        <button onclick="createGame()" class="btn-primary" id="btnCreate">Générer un PIN</button>
        <div id="pinDisplay" style="display:none; font-size: 2rem; font-weight: 800; color: #fbbf24; letter-spacing: 2px;">
            PIN: <span id="pinVal"></span>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="glass-panel">
            <h3 style="margin-top: 0; color: #94a3b8;">Réglages & Scores</h3>
            <label style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 5px; display: block;">Prochain Thème :</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="Programmation">Programmation</option>
                <option value="Réseaux">Réseaux</option>
                <option value="Sport">Sport</option>
                <option value="Maroc">Maroc</option>
                <option value="Animaux">Animaux</option>
            </select>
            <div id="playersList" style="margin-top: 20px;"></div>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column;">
            <button onclick="nextQuestion()" class="btn-primary" id="btnNext" style="width: 100%; font-size: 1.5rem; padding: 20px;">Commencer le jeu</button>
            
            <div id="qArea" class="q-area" style="display:none;">
                <div class="q-text" id="hQ"></div>
                <div class="choice-grid" id="hChoices"></div>
            </div>

            <div class="buzz-alert" id="buzzArea">
                🚨 <span id="buzzName"></span> a buzzé ! <br>
                <span id="buzzAnswer" style="display:block; margin-top:10px; color:#fde047; font-size:2rem;"></span>
            </div>

            <div class="action-btns" id="validBtns">
                <button class="btn-valid yes" onclick="validate(true)">✅ BONNE RÉPONSE (+1)</button>
                <button class="btn-valid no" onclick="validate(false)">❌ MAUVAISE RÉPONSE (-1)</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myPin = "";
        let isFirstQuestion = true;

        function createGame() { socket.emit('admin_create_game'); }
        
        socket.on('game_created', (data) => {
            myPin = data.pin;
            document.getElementById('btnCreate').style.display = 'none';
            document.getElementById('pinDisplay').style.display = 'block';
            document.getElementById('pinVal').innerText = myPin;
            document.getElementById('dashboard').style.display = 'grid';
        });

        function changeTheme() {
            const theme = document.getElementById('themeSelect').value;
            socket.emit('change_theme', { pin: myPin, theme });
        }

        socket.on('update_players', (players) => {
            const list = document.getElementById('playersList');
            list.innerHTML = "";
            for (let id in players) {
                list.innerHTML += `<div class="player-card"><span>${players[id].name}</span> <span class="score">${players[id].score} pts</span></div>`;
            }
        });

        socket.on('admin_error', (msg) => {
            alert("⚠️ " + msg);
            document.getElementById('btnNext').innerText = "Réessayer";
        });

        function nextQuestion() {
            if(isFirstQuestion) {
                document.getElementById('btnNext').innerText = "Question Suivante";
                isFirstQuestion = false;
            }
            document.getElementById('qArea').style.display = 'block';
            document.getElementById('buzzArea').style.display = 'none';
            document.getElementById('validBtns').style.display = 'none';
            socket.emit('admin_action_next', { pin: myPin });
        }

        socket.on('admin_display_question', (q) => {
            document.getElementById('hQ').innerText = q.question_text;
            let choicesHtml = "";
            ['A','B','C','D'].forEach(l => {
                const isCorrect = q.correct_answer === l;
                const className = isCorrect ? 'choice correct' : 'choice';
                choicesHtml += `<div class="${className}">${l}: ${q[`choice_${l.toLowerCase()}`]}</div>`;
            });
            document.getElementById('hChoices').innerHTML = choicesHtml;
        });

        socket.on('player_answered', (data) => {
            document.getElementById('buzzArea').style.display = 'block';
            document.getElementById('buzzName').innerText = data.name;
            document.getElementById('buzzAnswer').innerText = `A choisi : ${data.answer}`;
            document.getElementById('validBtns').style.display = 'flex';
        });

        function validate(isCorrect) {
            socket.emit('admin_validate', { pin: myPin, isCorrect });
            document.getElementById('validBtns').style.display = 'none';
            document.getElementById('buzzArea').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Crazy Challenge</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; background: #1e293b; padding: 15px; border-radius: 8px; }
        .btn-main { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; margin-top: 20px; display: none; }
        .panel { background: #1e293b; padding: 20px; border-radius: 8px; }
        select { padding: 10px; width: 100%; margin-bottom: 20px; background: #334155; color: white; border: none; border-radius: 5px; font-size: 16px; }
        .correct-ans { color: #4ade80; font-weight: bold; font-size: 20px; margin-top: 10px; }
        .buzz-alert { display: none; background: #b91c1c; padding: 15px; border-radius: 8px; text-align: center; font-size: 20px; margin-top: 20px; }
        .action-btns { display: none; gap: 10px; margin-top: 20px; }
        .action-btns button { flex: 1; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; font-size: 16px;}
        .player-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Panneau Admin</h1>
        <button onclick="createGame()" class="btn-main" id="btnCreate">Créer Session</button>
        <h2 id="pinDisplay" style="display:none; color:#fbbf24;">PIN: <span id="pinVal"></span></h2>
    </div>

    <div class="grid" id="dashboard">
        <div class="panel">
            <h3>Paramètres & Scores</h3>
            <label>Prochain Thème :</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="Général">Général</option>
                <option value="Réseaux">Réseaux</option>
                <option value="Big Data">Big Data</option>
            </select>
            <div id="playersList"></div>
        </div>

        <div class="panel">
            <button onclick="nextQuestion()" class="btn-main" style="width: 100%; margin-bottom: 20px;">Nouvelle Question</button>
            <div id="qArea" style="display:none;">
                <h3 id="hQ" style="color:#fbbf24;"></h3>
                <div id="hChoices" style="font-size: 18px; line-height: 1.8;"></div>
                <div id="hCorrect" class="correct-ans"></div>
            </div>

            <div class="buzz-alert" id="buzzArea">🚨 En attente de la réponse de <span id="buzzName"></span>...</div>

            <div class="action-btns" id="validBtns">
                <button style="background: #22c55e;" onclick="validate(true)">✅ CORRECT (+1)</button>
                <button style="background: #ef4444;" onclick="validate(false)">❌ FAUX (-1)</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myPin = "";

        function createGame() { socket.emit('admin_create_game'); }
        
        socket.on('game_created', (data) => {
            myPin = data.pin;
            document.getElementById('btnCreate').style.display = 'none';
            document.getElementById('pinDisplay').style.display = 'block';
            document.getElementById('pinVal').innerText = myPin;
            document.getElementById('dashboard').style.display = 'grid';
        });

        function changeTheme() {
            const theme = document.getElementById('themeSelect').value;
            socket.emit('change_theme', { pin: myPin, theme });
        }

        socket.on('update_players', (players) => {
            const list = document.getElementById('playersList');
            list.innerHTML = "";
            for (let id in players) {
                list.innerHTML += `<div class="player-item"><span>${players[id].name}</span> <span>Score: <b>${players[id].score}</b></span></div>`;
            }
        });

        function nextQuestion() {
            document.getElementById('qArea').style.display = 'block';
            document.getElementById('buzzArea').style.display = 'none';
            document.getElementById('validBtns').style.display = 'none';
            socket.emit('admin_action_next', { pin: myPin });
        }

        socket.on('admin_display_question', (q) => {
            document.getElementById('hQ').innerText = q.question_text;
            let choicesHtml = "";
            ['A','B','C','D'].forEach(l => choicesHtml += `<div>${l}: ${q[`choice_${l.toLowerCase()}`]}</div>`);
            document.getElementById('hChoices').innerHTML = choicesHtml;
            document.getElementById('hCorrect').innerText = `👉 BONNE RÉPONSE : ${q.correct_answer}`;
        });

        socket.on('player_answered', (data) => {
            document.getElementById('buzzArea').style.display = 'block';
            document.getElementById('buzzArea').innerText = `${data.name} a choisi la réponse : ${data.answer}`;
            document.getElementById('validBtns').style.display = 'flex';
        });

        function validate(isCorrect) {
            socket.emit('admin_validate', { pin: myPin, isCorrect });
            document.getElementById('validBtns').style.display = 'none';
            document.getElementById('buzzArea').style.display = 'none';
        }
    </script>
</body>
</html>

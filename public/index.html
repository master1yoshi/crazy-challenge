<!DOCTYPE html>
<html>
<body style="background:#111; color:white; text-align:center; font-family: sans-serif;">
    <div id="login" style="margin-top: 20%;">
        <input id="name" placeholder="Nom de l'équipe" style="padding: 10px; font-size: 18px;"><br><br>
        <input id="pin" placeholder="PIN" style="padding: 10px; font-size: 18px;"><br><br>
        <button onclick="join()" style="padding: 10px 20px; font-size: 18px;">Rejoindre</button>
    </div>

    <div id="game" style="display:none; padding: 20px;">
        <h2 id="qText">En attente du Host...</h2>
        <div id="choices" style="display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px 0;">
            <div id="cA" style="visibility: hidden; background: #333; padding: 10px; width: 80%; border-radius: 5px;">A: <span id="tA"></span></div>
            <div id="cB" style="visibility: hidden; background: #333; padding: 10px; width: 80%; border-radius: 5px;">B: <span id="tB"></span></div>
            <div id="cC" style="visibility: hidden; background: #333; padding: 10px; width: 80%; border-radius: 5px;">C: <span id="tC"></span></div>
            <div id="cD" style="visibility: hidden; background: #333; padding: 10px; width: 80%; border-radius: 5px;">D: <span id="tD"></span></div>
        </div>
        <button id="buzzBtn" disabled onclick="buzz()" style="width:200px; height:200px; border-radius:50%; background:gray; font-size: 30px; font-weight: bold; border:none; cursor:not-allowed; transition: 0.3s;">BUZZ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function join() {
            socket.emit('join_game', { 
                pin: document.getElementById('pin').value, 
                name: document.getElementById('name').value, 
                role: 'player' 
            });
        }

        socket.on('join_success', () => {
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        });

        socket.on('display_question', (data) => {
            new Audio('sounds/pre_question.mp3').play();
            const btn = document.getElementById('buzzBtn');
            btn.disabled = true;
            btn.style.background = 'gray';
            btn.style.cursor = 'not-allowed';
            
            document.getElementById('qText').innerText = data.question_text;
            const letters = ['A', 'B', 'C', 'D'];
            
            letters.forEach((l) => {
                document.getElementById(`c${l}`).style.visibility = 'hidden';
                document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`];
            });

            // Staggered reveal
            setTimeout(() => document.getElementById('cA').style.visibility = 'visible', 1000);
            setTimeout(() => document.getElementById('cB').style.visibility = 'visible', 2000);
            setTimeout(() => document.getElementById('cC').style.visibility = 'visible', 3000);
            setTimeout(() => {
                document.getElementById('cD').style.visibility = 'visible';
                btn.disabled = false;
                btn.style.background = 'red';
                btn.style.cursor = 'pointer';
            }, 4000);
        });

        function buzz() {
            if (!document.getElementById('buzzBtn').disabled) socket.emit('buzz');
        }

        socket.on('buzzer_hit', (winnerId) => {
            if(socket.id === winnerId) {
                document.getElementById('buzzBtn').style.background = 'green';
            } else {
                document.getElementById('buzzBtn').style.background = 'gray';
                document.getElementById('buzzBtn').disabled = true;
            }
        });
    </script>
</body>
</html>

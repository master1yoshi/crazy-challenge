<!DOCTYPE html>
<html>
<body style="background:#111; color:white; text-align:center;">
    <input id="name" placeholder="Nom"> <button onclick="join()">JOIN</button>
    <div id="game" style="display:none">
        <button onclick="socket.emit('buzz')" style="width:200px; height:200px; border-radius:50%; background:red;">BUZZ</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function join() { socket.emit('join', document.getElementById('name').value); document.getElementById('game').style.display='block'; }
        socket.on('new_question', () => new Audio('pre_question.mp3').play());
        socket.on('buzzer_hit', () => new Audio('buzz_sound.mp3').play());
    </script>
</body>
</html>

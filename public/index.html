<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #111827; color: white; text-align: center; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .login { height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle at top, #1f2937, #030712); }
        .title-glow { font-size: 3rem; font-weight: 900; background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5)); margin-bottom: 40px; }
        .input-cool { width: 85%; padding: 18px; margin: 10px 0; border-radius: 15px; border: 2px solid #374151; background: rgba(0,0,0,0.5); color: white; font-size: 1.2rem; font-family: inherit; text-align: center; transition: 0.3s; outline: none;}
        .input-cool:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .btn-join { width: 85%; background: #3b82f6; padding: 20px; border: none; border-radius: 15px; color: white; font-size: 1.5rem; font-weight: 900; margin-top: 20px; box-shadow: 0 8px 0 #1d4ed8; transition: 0.1s; text-transform: uppercase; }
        .btn-join:active { transform: translateY(8px); box-shadow: 0 0 0 #1d4ed8; }
        
        /* Correction Mobile pour le bas de l'écran */
        #game { display: none; flex-direction: column; min-height: 100dvh; padding: 20px; padding-bottom: 40px; box-sizing: border-box; background: #0f172a; position: relative; }
        
        #qText { font-size: 1.3rem; margin: 15px 0; min-height: 60px; line-height: 1.4; color: #f8fafc; }
        
        .buzzer-container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .buzzer { width: 250px; height: 250px; border-radius: 50%; background: #ef4444; border: none; color: white; font-size: 3.5rem; font-family: 'Montserrat'; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; position: relative; transition: all 0.1s ease; box-shadow: 0 20px 0 #991b1b, 0 30px 40px rgba(0,0,0,0.6); display: none; }
        .buzzer.ready { display: block; animation: heartbeat 1.5s infinite; }
        .buzzer.ready:active { transform: translateY(20px); box-shadow: 0 0 0 #991b1b, 0 10px 20px rgba(0,0,0,0.6); background: #dc2626; }
        @keyframes heartbeat { 0% { transform: scale(1); } 15% { transform: scale(1.05); } 30% { transform: scale(1); } }

        #choices { display: none; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1; width: 100%; margin-top: 20px; }
        .choice-btn { border: none; border-radius: 12px; color: white; font-size: 1.2rem; font-weight: 800; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 0 rgba(0,0,0,0.2); transition: 0.1s; }
        .choice-btn:active { transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0); }
        .bg-red { background: #e21b3c; box-shadow: 0 8px 0 #a01027; }
        .bg-blue { background: #1368ce; box-shadow: 0 8px 0 #0c4284; }
        .bg-yellow { background: #d89e00; box-shadow: 0 8px 0 #8b6600; }
        .bg-green { background: #26890c; box-shadow: 0 8px 0 #154c06; }
        .letter-badge { font-size: 2rem; opacity: 0.8; margin-bottom: 5px; }

        #status { padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: 900; margin-top: auto; text-transform: uppercase; background: #1e293b; transition: all 0.3s; }
        
        .overlay { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .win-bg { background: rgba(16, 185, 129, 0.95); }
    </style>
</head>
<body>
    <div class="login" id="login">
        <div class="title-glow">CHAMAK CHALO</div>
        <input id="name" class="input-cool" placeholder="Nom de l'équipe" autocomplete="off">
        <input id="pin" type="number" class="input-cool" placeholder="Code PIN" autocomplete="off">
        <button class="btn-join" onclick="join()">C'est parti !</button>
    </div>

    <div id="game">
        <div id="themeAlert" style="color: #fbbf24; font-weight: bold; margin-bottom: 10px; display: none;">Nouveau Thème : <span id="themeName"></span></div>
        <div id="qText" style="color: #cbd5e1;">En attente de la question...</div>
        
        <div class="buzzer-container" id="buzzer-container">
            <button class="buzzer" id="buzzer" onclick="buzz()">BUZZ</button>
        </div>
        
        <div id="choices">
            <button class="choice-btn bg-red" onclick="sendAns('A')"><span class="letter-badge">A</span><span id="tA"></span></button>
            <button class="choice-btn bg-blue" onclick="sendAns('B')"><span class="letter-badge">B</span><span id="tB"></span></button>
            <button class="choice-btn bg-yellow" onclick="sendAns('C')"><span class="letter-badge">C</span><span id="tC"></span></button>
            <button class="choice-btn bg-green" onclick="sendAns('D')"><span class="letter-badge">D</span><span id="tD"></span></button>
        </div>

        <div id="status">Préparez-vous</div>
    </div>

    <div id="winScreen" class="overlay win-bg">
        <h1 style="font-size: 4rem; margin: 0;">🏆</h1>
        <h2 style="font-size: 2.5rem; text-align:center;">CHAMPION!</h2>
        <h3 id="winName" style="font-size: 3rem; color: #ffe4e6; text-transform: uppercase;"></h3>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isLocked = false;

        function join() {
            socket.emit('join_game', { pin: document.getElementById('pin').value, name: document.getElementById('name').value, role: 'player' });
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }

        socket.on('theme_notification', (theme) => {
            document.getElementById('themeAlert').style.display = 'block';
            document.getElementById('themeName').innerText = theme;
        });

        socket.on('display_question', (data) => {
            isLocked = false;
            document.getElementById('themeAlert').style.display = 'none';
            document.getElementById('buzzer').classList.remove('ready');
            document.getElementById('buzzer-container').style.display = 'flex';
            document.getElementById('choices').style.display = 'none';
            
            document.getElementById('qText').innerText = data.question_text;
            ['A','B','C','D'].forEach(l => document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`]);
            
            document.getElementById('status').innerText = "Lisez la question...";
            document.getElementById('status').style.background = "#334155";
            document.getElementById('status').style.color = "white";

            setTimeout(() => { 
                if(!isLocked) {
                    document.getElementById('buzzer').classList.add('ready');
                    document.getElementById('status').innerText = "CLIQUEZ !";
                    document.getElementById('status').style.background = "#ef4444";
                }
            }, 4000);
        });

        function buzz() {
            if (document.getElementById('buzzer').classList.contains('ready')) socket.emit('buzz');
        }

        socket.on('buzzer_hit', (data) => {
            document.getElementById('buzzer').classList.remove('ready');
            if (socket.id === data.winnerId) {
                document.getElementById('buzzer-container').style.display = 'none';
                document.getElementById('choices').style.display = 'grid';
                document.getElementById('status').innerText = "CHOISISSEZ VITE !";
                document.getElementById('status').style.background = "#3b82f6";
            } else {
                document.getElementById('status').innerText = `Trop lent ! ${data.name} a buzzé.`;
                document.getElementById('status').style.background = "#475569";
            }
        });

        function sendAns(l) {
            socket.emit('submit_answer', l);
            document.getElementById('choices').style.display = 'none';
            document.getElementById('buzzer-container').style.display = 'flex';
            document.getElementById('status').innerText = "Envoi...";
        }

        socket.on('answer_correct', (data) => {
            document.getElementById('status').innerText = `✅ EXCELLENT ! SCORE: ${data.score}`;
            document.getElementById('status').style.background = "#10b981";
        });

        socket.on('answer_wrong', (data) => {
            document.getElementById('status').innerText = `❌ ERREUR ! SCORE: ${data.score}`;
            document.getElementById('status').style.background = "#ef4444";
            
            if (socket.id === data.lockedId) {
                isLocked = true;
                document.getElementById('status').innerText += " (Bloqué)";
            } else {
                setTimeout(() => {
                    document.getElementById('buzzer').classList.add('ready');
                    document.getElementById('status').innerText = "REBOND ! BUZZEZ !";
                }, 1500); 
            }
        });

        socket.on('answer_wrong_all', (data) => {
            document.getElementById('status').innerText = `❌ ERREUR ! SCORE: ${data.score}\nFin du tour. Attente de la question suivante...`;
            document.getElementById('status').style.background = "#ef4444";
            isLocked = true;
        });

        socket.on('game_over', (data) => {
            document.getElementById('winScreen').style.display = 'flex';
            document.getElementById('winName').innerText = data.name;
        });
    </script>
</body>
</html>

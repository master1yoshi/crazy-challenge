<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joueur</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .login { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 8px; border: 2px solid #333; background: #222; color: white; font-size: 18px; text-align: center; }
        .btn-join { background: #3b82f6; padding: 15px 40px; border: none; border-radius: 8px; color: white; font-size: 20px; font-weight: bold; margin-top: 10px; }

        #game-screen { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; position: relative; }
        
        #qText { font-size: 22px; text-align: center; margin-bottom: 20px; min-height: 60px; font-weight: bold;}

        /* Le Bouton Buzz Géant */
        #buzzer-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; transition: all 0.5s; }
        .buzzer { width: 220px; height: 220px; border-radius: 50%; background: #444; border: 10px solid #222; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-size: 40px; font-weight: bold; color: rgba(255,255,255,0.5); transition: 0.2s; display: flex; justify-content: center; align-items: center; user-select: none; }
        .buzzer.ready { background: radial-gradient(circle, #ff2a2a, #b30000); border-color: #ff4d4d; color: white; box-shadow: 0 0 40px rgba(255, 0, 0, 0.6); cursor: pointer; animation: pulse 2s infinite; }
        .buzzer.ready:active { transform: scale(0.95); box-shadow: 0 0 10px red; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Les choix cachés initialement */
        #choices-container { display: none; width: 100%; flex-direction: column; gap: 15px; animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .choice-btn { background: #1e293b; border: 2px solid #334155; padding: 20px; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; text-align: left; transition: 0.2s; }
        .choice-btn:active { transform: scale(0.98); background: #3b82f6; }

        #status { margin-top: auto; padding: 15px; background: #222; width: 100%; text-align: center; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login" id="login">
        <h1 style="color: gold;">Crazy Challenge</h1>
        <input id="name" placeholder="Nom Équipe">
        <input id="pin" type="number" placeholder="PIN">
        <button class="btn-join" onclick="join()">Rejoindre</button>
    </div>

    <div id="game-screen">
        <div id="qText">En attente...</div>
        
        <div id="buzzer-container">
            <div class="buzzer" id="btnBuzz" onclick="buzz()">BUZZ</div>
        </div>

        <div id="choices-container">
            <button class="choice-btn" onclick="selectAnswer('A')">A: <span id="tA"></span></button>
            <button class="choice-btn" onclick="selectAnswer('B')">B: <span id="tB"></span></button>
            <button class="choice-btn" onclick="selectAnswer('C')">C: <span id="tC"></span></button>
            <button class="choice-btn" onclick="selectAnswer('D')">D: <span id="tD"></span></button>
        </div>

        <div id="status">Préparez-vous</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let canBuzz = false;

        function join() {
            socket.emit('join_game', { pin: document.getElementById('pin').value, name: document.getElementById('name').value, role: 'player' });
            document.getElementById('login').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        socket.on('display_question', (data) => {
            // Reset UI
            document.getElementById('buzzer-container').style.display = 'flex';
            document.getElementById('choices-container').style.display = 'none';
            const buzzer = document.getElementById('btnBuzz');
            buzzer.className = 'buzzer';
            canBuzz = false;

            document.getElementById('qText').innerText = data.question_text;
            ['A','B','C','D'].forEach(l => document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`]);
            
            document.getElementById('status').innerText = "Lisez la question...";
            document.getElementById('status').style.color = "white";

            // Après 4 secondes, le buzzer s'active
            setTimeout(() => {
                buzzer.classList.add('ready');
                canBuzz = true;
                document.getElementById('status').innerText = "BUZZEZ !";
                document.getElementById('status').style.color = "red";
            }, 4000);
        });

        function buzz() {
            if (!canBuzz) return;
            socket.emit('buzz');
        }

        socket.on('buzzer_hit', (winnerId) => {
            canBuzz = false;
            document.getElementById('btnBuzz').className = 'buzzer'; // Désactive visuellement le buzz
            
            if (socket.id === winnerId) {
                // Si c'est nous qui avons gagné le buzz : On affiche les choix
                document.getElementById('buzzer-container').style.display = 'none';
                document.getElementById('choices-container').style.display = 'flex';
                document.getElementById('status').innerText = "CHOISISSEZ UNE RÉPONSE !";
                document.getElementById('status').style.color = "#3b82f6";
            } else {
                // Si on a perdu
                document.getElementById('status').innerText = "Trop lent ! Une autre équipe a buzzé.";
                document.getElementById('status').style.color = "gray";
            }
        });

        function selectAnswer(letter) {
            socket.emit('submit_answer', letter);
            document.getElementById('choices-container').style.display = 'none';
            document.getElementById('buzzer-container').style.display = 'flex';
            document.getElementById('status').innerText = `Réponse ${letter} envoyée !`;
        }

        socket.on('answer_result', (isCorrect) => {
            document.getElementById('status').innerText = isCorrect ? "✅ BONNE RÉPONSE !" : "❌ MAUVAISE RÉPONSE !";
            document.getElementById('status').style.color = isCorrect ? "#22c55e" : "#ef4444";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Joueur</title>
    <style>
        body { background: #121212; color: white; text-align: center; padding: 20px; font-family: sans-serif; }
        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="setup"><input id="name" placeholder="Nom équipe"><button onclick="join()">REJOINDRE</button></div>
    <div id="game" style="display:none;">
        <h2 id="score-display">Score: 0</h2>
        <button id="buzz" onclick="socket.emit('buzz')" style="width:150px; height:150px; border-radius:50%; background:red; border:none; font-size:25px;">BUZZ</button>
        <div id="opts"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function join() { socket.emit('join_team', document.getElementById('name').value); document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='block'; }
        socket.on('new_question', (d) => { document.getElementById('opts').innerHTML = d.options.map((o,i) => `<button class="btn" onclick="socket.emit('submit_answer', ${i})">${o}</button>`).join(''); });
        socket.on('update_teams', (t) => { const my = t[socket.id]; if(my) document.getElementById('score-display').innerText = "Score: " + my.score; });
    </script>
</body>
</html>

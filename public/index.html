<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: white; text-align: center; }
        .login { padding: 50px 20px; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 8px; border: 2px solid #333; background: #222; color: white; font-size: 18px; }
        .btn-join { background: #3b82f6; padding: 15px 40px; border: none; border-radius: 8px; color: white; font-size: 20px; font-weight: bold; }
        
        #game { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; }
        #themeAlert { background: #3b82f6; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; }
        
        #buzzer { width: 200px; height: 200px; border-radius: 50%; background: #444; border: none; color: white; font-size: 40px; font-weight: bold; margin: auto; transition: 0.3s; display: none; }
        #buzzer.active { background: red; box-shadow: 0 0 30px red; cursor: pointer; }
        
        #choices { display: none; flex-direction: column; gap: 10px; margin: auto; width: 100%; }
        .choice-btn { background: #1e293b; padding: 20px; border-radius: 10px; border: 2px solid #334155; color: white; font-size: 18px; text-align: left; }
        
        #status { padding: 15px; background: #222; border-radius: 8px; font-weight: bold; margin-top: auto; }
        .overlay-win { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(34, 197, 94, 0.95); display: none; flex-direction: column; justify-content: center; z-index: 100; font-size: 40px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login" id="login">
        <h1 style="color: gold;">Crazy Challenge</h1>
        <input id="name" placeholder="Nom Équipe">
        <input id="pin" type="number" placeholder="PIN">
        <button class="btn-join" onclick="join()">Rejoindre</button>
    </div>

    <div id="game">
        <div id="themeAlert">Le Host a changé le thème pour le prochain tour : <span id="themeName"></span></div>
        <h3 id="qText">En attente...</h3>
        
        <button id="buzzer" onclick="buzz()">BUZZ</button>
        
        <div id="choices">
            <button class="choice-btn" onclick="sendAns('A')">A: <span id="tA"></span></button>
            <button class="choice-btn" onclick="sendAns('B')">B: <span id="tB"></span></button>
            <button class="choice-btn" onclick="sendAns('C')">C: <span id="tC"></span></button>
            <button class="choice-btn" onclick="sendAns('D')">D: <span id="tD"></span></button>
        </div>

        <div id="status">Préparez-vous</div>
    </div>

    <div id="winScreen" class="overlay-win">🏆 VICTOIRE ! 🏆<br><span id="winName" style="color:white; font-size: 60px;"></span> a atteint 10 points !</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isLocked = false; // Vrai si le joueur a eu faux à cette question

        function join() {
            socket.emit('join_game', { pin: document.getElementById('pin').value, name: document.getElementById('name').value, role: 'player' });
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }

        socket.on('theme_notification', (theme) => {
            document.getElementById('themeAlert').style.display = 'block';
            document.getElementById('themeName').innerText = theme;
        });

        socket.on('display_question', (data) => {
            isLocked = false;
            document.getElementById('themeAlert').style.display = 'none';
            document.getElementById('buzzer').style.display = 'block';
            document.getElementById('buzzer').className = '';
            document.getElementById('choices').style.display = 'none';
            document.getElementById('qText').innerText = data.question_text;
            
            ['A','B','C','D'].forEach(l => document.getElementById(`t${l}`).innerText = data[`choice_${l.toLowerCase()}`]);
            document.getElementById('status').innerText = "Lecture de la question...";
            document.getElementById('status').style.background = "#333";

            setTimeout(() => { activateBuzzer(); }, 4000);
        });

        function activateBuzzer() {
            if(!isLocked) {
                document.getElementById('buzzer').classList.add('active');
                document.getElementById('status').innerText = "BUZZEZ !";
                document.getElementById('status').style.background = "#b91c1c";
            }
        }

        function buzz() {
            if (document.getElementById('buzzer').classList.contains('active')) socket.emit('buzz');
        }

        socket.on('buzzer_hit', (data) => {
            document.getElementById('buzzer').classList.remove('active');
            if (socket.id === data.winnerId) {
                document.getElementById('buzzer').style.display = 'none';
                document.getElementById('choices').style.display = 'flex';
                document.getElementById('status').innerText = "VOTRE TOUR : Choisissez !";
                document.getElementById('status').style.background = "#3b82f6";
            } else {
                document.getElementById('status').innerText = `${data.name} a buzzé !`;
                document.getElementById('status').style.background = "#444";
            }
        });

        function sendAns(l) {
            socket.emit('submit_answer', l);
            document.getElementById('choices').style.display = 'none';
            document.getElementById('buzzer').style.display = 'block';
            document.getElementById('status').innerText = "Réponse envoyée...";
        }

        socket.on('answer_correct', (data) => {
            document.getElementById('status').innerText = `✅ VRAI ! Score de ${data.name} : ${data.score}`;
            document.getElementById('status').style.background = "#22c55e";
        });

        socket.on('answer_wrong', (data) => {
            document.getElementById('status').innerText = `❌ FAUX pour ${data.name}. Score : ${data.score}`;
            document.getElementById('status').style.background = "#ef4444";
            
            if (socket.id === data.lockedId) {
                isLocked = true;
                document.getElementById('status').innerText += " (Vous êtes bloqué pour cette question)";
            } else {
                // Relance du buzzer pour les autres !
                setTimeout(() => activateBuzzer(), 1500); 
            }
        });

        socket.on('game_over', (data) => {
            document.getElementById('winScreen').style.display = 'flex';
            document.getElementById('winName').innerText = data.name;
        });
    </script>
</body>
</html>

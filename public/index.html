<!DOCTYPE html>
<html>
<head>
    <title>Joueur - Buzz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #buzzBtn { width: 100%; height: 200px; background: #ff4444; border-radius: 20px; font-size: 40px; color: white; border: none; box-shadow: 0 10px #900; margin-top: 20px; }
        #buzzBtn:disabled { background: #333; box-shadow: none; opacity: 0.3; }
        .opt-btn { background: #1a2a3a; color: white; padding: 25px; border-radius: 10px; border: 2px solid #00d4ff; width: 100%; margin-bottom: 10px; font-size: 18px; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; font-size: 18px; margin-bottom: 10px; }
        .join-btn { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="setup">
        <h1>Crazy Challenge</h1>
        <input type="text" id="teamInput" placeholder="Nom d'équipe">
        <br><button class="join-btn" onclick="join()">REJOINDRE</button>
    </div>

    <div id="game" style="display:none;">
        <div id="status" style="color:#ffeb3b; font-size:20px;">Préparez-vous...</div>
        <div id="options" style="margin-top:20px;"></div>
        <button id="buzzBtn" onclick="socket.emit('buzz')" disabled>BUZZ !</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        // Connexion automatique au salon basé sur l'URL
        const roomId = window.location.pathname.split('/')[1] || 'default';
        socket.emit('join_room', roomId);

        let myName = "";
        function join() {
            myName = document.getElementById('teamInput').value;
            if(!myName) return;
            socket.emit('join_team', myName);
            document.getElementById('setup').style.display='none';
            document.getElementById('game').style.display='block';
        }
        socket.on('new_question_intro', () => {
            document.getElementById('status').innerText = "Question en cours...";
            document.getElementById('options').innerHTML = "";
            document.getElementById('buzzBtn').disabled = true;
        });
        socket.on('show_options', (data) => {
            document.getElementById('status').innerText = "BUZZER MAINTENANT !";
            document.getElementById('buzzBtn').disabled = false;
            const container = document.getElementById('options');
            data.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "opt-btn"; b.innerText = opt; b.disabled = true;
                b.onclick = () => socket.emit('submit_answer', i);
                container.appendChild(b);
            });
        });
        socket.on('lock_buzz', (data) => {
            document.getElementById('buzzBtn').disabled = true;
            if(data.name === myName) {
                document.getElementById('status').innerText = "C'EST À VOUS !";
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
            } else {
                document.getElementById('status').innerText = data.name + " répond...";
            }
        });
        socket.on('release_buzz', () => {
            document.getElementById('buzzBtn').disabled = false;
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        });
    </script>
</body>
</html>

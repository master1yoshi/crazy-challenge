<!DOCTYPE html>
<html>
<body style="background:#222; color:white;">
    <button onclick="socket.emit('start_game', 'cinema')">Lancer Cinéma</button>
    <button onclick="socket.emit('answer', true)">Bonne réponse</button>
    <button onclick="socket.emit('answer', false)">Mauvaise réponse</button>
    <div id="scores"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('update_teams', (t) => document.getElementById('scores').innerText = JSON.stringify(t));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Host Panel</title>
</head>
<body style="background:#111; color:white; padding:50px;">
    <h1>Console Admin</h1>
    <input id="theme" placeholder="Thème"><button onclick="socket.emit('start_game_ai', document.getElementById('theme').value)">LANCER</button>
    <div id="admin-info" style="margin-top:30px;"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('join_room', window.location.pathname.split('/')[1]);
        socket.on('new_question', (d) => {
            document.getElementById('admin-info').innerHTML = `<h3>${d.question}</h3><p>Scores : ${Object.values(d.teams).map(x => x.name + ': ' + x.score).join(', ')}</p>`;
        });
    </script>
</body>
</html>

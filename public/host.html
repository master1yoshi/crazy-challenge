<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin - Crazy Challenge</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .controls { margin: 20px; padding: 20px; border: 1px solid #444; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 16px; }
        .start-btn { background-color: green; color: white; border: none; }
        .reset-btn { background-color: red; color: white; border: none; }
        #classement { margin-top: 20px; text-align: left; display: inline-block; }
    </style>
</head>
<body>

    <h1>Console Admin</h1>

    <div class="controls">
        <h3>Choisir le thème :</h3>
        <button onclick="changeTheme('Maroc')">Maroc</button>
        <button onclick="changeTheme('Cuisine')">Cuisine</button>
        <button onclick="changeTheme('Football')">Football</button>
        <button onclick="changeTheme('Animaux')">Animaux</button>
        <br>
        <button class="start-btn" onclick="startGame()">COMMENCER LA PARTIE</button>
        <button class="reset-btn" onclick="resetTeams()">VIDER CLASSEMENT</button>
    </div>

    <div id="statut"></div>
    
    <div id="classement">
        <h3>Classement en direct :</h3>
        <ul id="teams-list"></ul>
    </div>

    <script>
        const socket = io();
        const roomId = window.location.pathname.split('/')[1];

        socket.emit('join_room', roomId);

        function changeTheme(theme) {
            socket.emit('change_theme', theme);
        }

        function startGame() {
            // Demande le thème par défaut ou celui sélectionné
            socket.emit('start_game_ai', 'Maroc');
        }

        function resetTeams() {
            socket.emit('reset_teams');
        }

        socket.on('update_teams', (teams) => {
            const list = document.getElementById('teams-list');
            list.innerHTML = '';
            for (let id in teams) {
                let li = document.createElement('li');
                li.innerText = `${teams[id].name} : ${teams[id].score} pts`;
                list.appendChild(li);
            }
        });

        socket.on('status_message', (msg) => {
            document.getElementById('statut').innerText = msg;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Host Panel</title>
</head>
<body>
    <h1>Console Admin</h1>
    <input type="text" id="theme" placeholder="Thème...">
    <button onclick="launch()">LANCER LE JEU</button>
    <button onclick="reset()">VIDER LES SCORES</button>
    <div id="teams"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const roomId = window.location.pathname.split('/')[1];
        socket.emit('join_room', roomId);

        function launch() { socket.emit('start_game_ai', document.getElementById('theme').value); }
        function reset() { socket.emit('reset_teams'); }

        socket.on('update_teams', (t) => {
            document.getElementById('teams').innerHTML = Object.values(t).map(x => `<div>${x.name}: ${x.score}</div>`).join('');
        });
        socket.on('lock_buzz', (d) => alert("BUZZ : " + d.name));
    </script>
</body>
</html>
